name: Reminder antiparassitario

on:
  schedule:
    # 06:00 e 07:00 UTC coprono le 08:00 sia in CEST (UTC+2) che in CET (UTC+1)
    # 18:00 e 19:00 UTC coprono le 20:00 sia in CEST che in CET
    - cron: '0 6,7,18,19 * * *'
  workflow_dispatch: # consente l'avvio manuale dalla UI di GitHub

jobs:
  reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessario per committare state.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui reminder
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python reminder_remote.py

      - name: Salva stato nel repo
        run: |
          git config user.name  "reminder-bot"
          git config user.email "reminder-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: aggiorna stato reminder [skip ci]"
          git push
